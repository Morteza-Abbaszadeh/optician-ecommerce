# nginx/nginx.conf

server {
    listen 8000;
    server_name localhost;

    # حداکثر حجم مجاز برای آپلود عکس عینک (مثلاً ۲۰ مگابایت)
    client_max_body_size 20M;

    # ۱. سرو کردن مستقیم فایل‌های استاتیک و تصاویر آپلود شده
    location /static/ {
        alias /var/www/static/;
        expires 30d; # کَش کردن عکس‌ها در مرورگر کاربر به مدت ۳۰ روز
        add_header Cache-Control "public, no-transform";
    }

    # ۲. پاس دادن بقیه درخواست‌ها (APIها و داکیومنت‌ها) به کانتینر FastAPI
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}