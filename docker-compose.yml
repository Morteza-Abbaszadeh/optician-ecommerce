version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: optician_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce_network

  redis:
    image: redis:7-alpine
    container_name: optician_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ecommerce_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: optician_backend
    restart: always
    env_file:
      - .env
    # پورت 8000 را از اینجا حذف کردیم. فقط Nginx از بیرون در دسترس است
    volumes:
      - ./backend:/app  # برای هات‌ریلود کدهای پایتون
      - static_volume:/app/static  # ولوم مشترک برای ذخیره عکس‌های آپلود شده
    depends_on:
      - db
      - redis
    networks:
      - ecommerce_network

  nginx:
    image: nginx:alpine
    container_name: optician_nginx
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # خطای تایپی برطرف شد (default.conf)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro  # دسترسی فقط-خواندنی Nginx به عکس‌ها
    depends_on:
      - backend
    networks:
      - ecommerce_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: optician_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # جلوگیری از اوررایت شدن ماژول‌های کانتینر
    depends_on:
      - nginx # فرانت‌اند حالا منتظر بالا آمدن Nginx می‌ماند
    networks:
      - ecommerce_network

volumes:
  postgres_data:
  static_volume: # ولوم گلوبال برای اشتراک‌گذاری عکس‌ها بین بک‌اند و انجین‌اکس

networks:
  ecommerce_network:
    driver: bridge